# ============================================================
# Base configuration
# ============================================================

model = "gpt-5.6-sol"
model_reasoning_effort = "medium"
personality = "pragmatic"

approval_policy = "never"
web_search = "disabled"
project_root_markers = [".git"]

# ============================================================
# Default permission
# ============================================================

default_permissions = "orchestrator"

# ============================================================
# Shared read-only base
# ============================================================

[permissions.project-read-only]
description = "Read-only project access with sensitive files denied."
extends = ":read-only"

[permissions.project-read-only.filesystem]
glob_scan_max_depth = 5

[permissions.project-read-only.filesystem.":workspace_roots"]
"**/*.env" = "deny"
"**/.env" = "deny"
"**/.env.*" = "deny"

# ============================================================
# Main orchestrator
# ============================================================

[permissions.orchestrator]
description = "Read-only project access with sensitive files denied."
extends = "project-read-only"

[permissions.orchestrator.filesystem]
glob_scan_max_depth = 3

[permissions.orchestrator.filesystem.":workspace_roots"]
"**/*.env" = "deny"
"**/.env" = "deny"
"**/.env.*" = "deny"

# ============================================================
# Frontend worker
# ============================================================


[permissions.fe-worker]
description = "프론트엔드 작업을 해줄 worker"
extends = "orchestrator"

[permissions.fe-worker.filesystem.":workspace_roots"]
"frontend/src/**" = "write"

# ============================================================
# Backend worker
# ============================================================

[permissions.be-worker]
description = "백엔드 작업을 해줄 worker"
extends = "orchestrator"

[permissions.be-worker.filesystem.":workspace_roots"]
"backend/src/**" = "write"
