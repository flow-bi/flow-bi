# ============================================================
# Base configuration
# ============================================================
model = "gpt-5.6-sol"
model_reasoning_effort = "medium"
personality = "pragmatic"

approval_policy = "never"
project_root_markers = [".git"]

# ============================================================
# Default permission
# ============================================================

default_permissions = ":danger-full-access"



# ============================================================
# worker-base
# ============================================================

[permissions.worker-base]
description = "worker base config"

[permissions.worker-base.filesystem]
glob_scan_max_depth = 3

[permissions.worker-base.filesystem.":workspace_roots"]
"." = "read"
"**/*.env" = "deny"
"**/.env" = "deny"
"**/.env.*" = "deny"

[permissions.worker-base.network]
enabled = false
























# ============================================================
# Frontend worker
# ============================================================


[permissions.fe-worker]
description = "프론트엔드 작업을 해줄 worker"
extends = "orchestrator"

[permissions.fe-worker.filesystem.":workspace_roots"]
"frontend/src/**" = "write"

# ============================================================
# Backend worker
# ============================================================

[permissions.be-worker]
description = "백엔드 작업을 해줄 worker"
extends = "orchestrator"

[permissions.be-worker.filesystem.":workspace_roots"]
"backend/src/**" = "write"
