# ============================================================
# Base configuration
# ============================================================
model = "gpt-5.6-sol"
model_reasoning_effort = "medium"
personality = "pragmatic"

approval_policy = "never"
project_root_markers = [".git"]

# ============================================================
# Default permission
# ============================================================

default_permissions = ":danger-full-access"



# ============================================================
# worker-base
# ============================================================

[permissions.worker-base]
description = "worker base config"

[permissions.worker-base.filesystem]
glob_scan_max_depth = 3

[permissions.worker-base.filesystem.":workspace_roots"]
"." = "read"
"**/*.env" = "deny"
"**/.env" = "deny"
"**/.env.*" = "deny"

[permissions.worker-base.network]
enabled = false
